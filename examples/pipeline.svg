<svg viewBox="0 0 960 120" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="960" height="120" fill="#ffffff"/>

  <!-- Stage 1: Idea -->
  <rect x="10" y="20" width="130" height="75" rx="8" fill="#1a1a2e"/>
  <text x="75" y="50" text-anchor="middle" font-size="18" fill="#f8c400">💡</text>
  <text x="75" y="68" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">IDEA</text>
  <text x="75" y="82" text-anchor="middle" font-size="8" fill="#adb5bd">idea-stress-tester</text>

  <!-- Arrow -->
  <line x1="140" y1="57" x2="158" y2="57" stroke="#dee2e6" stroke-width="1.5"/>
  <polygon points="158,52 168,57 158,62" fill="#dee2e6"/>

  <!-- Stage 2: Architecture -->
  <rect x="168" y="20" width="130" height="75" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="233" y="50" text-anchor="middle" font-size="18" fill="#1a1a2e">🏛️</text>
  <text x="233" y="68" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1a2e">ARCHITECTURE</text>
  <text x="233" y="82" text-anchor="middle" font-size="8" fill="#6c757d">book-architect</text>

  <!-- Arrow -->
  <line x1="298" y1="57" x2="316" y2="57" stroke="#dee2e6" stroke-width="1.5"/>
  <polygon points="316,52 326,57 316,62" fill="#dee2e6"/>

  <!-- Stage 3: Voice & Research -->
  <rect x="326" y="20" width="130" height="75" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="391" y="50" text-anchor="middle" font-size="18" fill="#1a1a2e">🎙️🔬</text>
  <text x="391" y="68" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1a2e">VOICE & RESEARCH</text>
  <text x="391" y="82" text-anchor="middle" font-size="8" fill="#6c757d">voice · research</text>

  <!-- Arrow -->
  <line x1="456" y1="57" x2="474" y2="57" stroke="#dee2e6" stroke-width="1.5"/>
  <polygon points="474,52 484,57 474,62" fill="#dee2e6"/>

  <!-- Stage 4: Writing -->
  <rect x="484" y="20" width="130" height="75" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="549" y="50" text-anchor="middle" font-size="18" fill="#1a1a2e">✍️🧵</text>
  <text x="549" y="68" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1a2e">WRITING</text>
  <text x="549" y="82" text-anchor="middle" font-size="8" fill="#6c757d">chapter · narrative</text>

  <!-- Arrow -->
  <line x1="614" y1="57" x2="632" y2="57" stroke="#dee2e6" stroke-width="1.5"/>
  <polygon points="632,52 642,57 632,62" fill="#dee2e6"/>

  <!-- Stage 5: Review -->
  <rect x="642" y="20" width="130" height="75" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="707" y="50" text-anchor="middle" font-size="18" fill="#1a1a2e">⚔️✂️</text>
  <text x="707" y="68" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1a2e">REVIEW & EDIT</text>
  <text x="707" y="82" text-anchor="middle" font-size="8" fill="#6c757d">critic · editor · reader</text>

  <!-- Arrow -->
  <line x1="772" y1="57" x2="790" y2="57" stroke="#dee2e6" stroke-width="1.5"/>
  <polygon points="790,52 800,57 790,62" fill="#dee2e6"/>

  <!-- Stage 6: Launch -->
  <rect x="800" y="20" width="150" height="75" rx="8" fill="#f8c400"/>
  <text x="875" y="50" text-anchor="middle" font-size="18" fill="#1a1a2e">🚀📣</text>
  <text x="875" y="68" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1a2e">LAUNCH & BEYOND</text>
  <text x="875" y="82" text-anchor="middle" font-size="8" fill="#1a1a2e">launch · repurpose</text>

  <!-- Footer -->
  <text x="480" y="112" text-anchor="middle" font-size="8" fill="#adb5bd">awesome-book-writing-suite · github.com/nkme2007/awesome-book-writing-suite</text>

</svg>
